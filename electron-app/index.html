<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Project Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Starter</p>
        <h1>Basic Electron app is ready.</h1>
        <p class="summary">
          This is the clean starter window. We can now add React, routing, state,
          APIs, or any project structure you want on top of this.
        </p>

        <div class="meta-grid">
          <article class="meta-card">
            <span class="label">Platform</span>
            <strong id="platform"></strong>
          </article>
          <article class="meta-card">
            <span class="label">Electron</span>
            <strong id="electron-version"></strong>
          </article>
          <article class="meta-card">
            <span class="label">Node.js</span>
            <strong id="node-version"></strong>
          </article>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
  </html>
